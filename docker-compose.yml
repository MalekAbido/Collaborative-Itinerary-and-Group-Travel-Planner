services:
  # 1. The Web Server
  web:
    build: .
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:z
    command: sh -c "composer install --no-interaction && apache2-foreground"
    depends_on:
      db:
        condition: service_healthy

  # 2. The Database
  db:
    image: mysql:8.0
    ports:
      - "${DB_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql 
      - ./install.sql:/docker-entrypoint-initdb.d/init.sql:z
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root --password=$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # 3. phpMyAdmin (Optional, for you and your team)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
    depends_on:
      db:
        condition: service_healthy

  # 4. Tailwind
  tailwind:
    image: node:20-slim
    container_name: itinerary-planner-tailwind
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html:z
    command: sh -c "npm install && npm run watch"
    stdin_open: true # <-- Keeps the standard input stream open
    tty: true        # <-- Allocates a terminal

volumes:
  db_data:
  # node_packages: